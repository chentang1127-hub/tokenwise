# TokenWise 中国版配置
# 默认配置 — 编辑以匹配你的设置。

# 界面语言: "zh" 表示中文, "en" 表示英文
locale: "zh"

# 无头模式 — 设为 true 以运行于 Docker / 无桌面服务器环境
headless: false

proxy:
  listen: "0.0.0.0:9401"       # 代理端口，你的应用连接到此 (0.0.0.0 = 全部网络接口)
  admin: "0.0.0.0:9400"        # 仪表板 + API 端口
  timeout_secs: 120             # 上游请求超时

# 你的 AI 厂商配置
providers:
  # ── 深度求索 DeepSeek ──────────────────────────
  - name: "deepseek"
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    models:
      - id: "deepseek-chat"
        tier: "cheap"
        cost_per_1k_prompt: 0.00027
        cost_per_1k_completion: 0.0011
      - id: "deepseek-reasoner"
        tier: "premium"
        cost_per_1k_prompt: 0.00055
        cost_per_1k_completion: 0.00219
      # Claude Code 模型别名 (DeepSeek API 原生支持)
      - id: "deepseek-v4-pro"
        tier: "premium"
        cost_per_1k_prompt: 0.00055
        cost_per_1k_completion: 0.00219
      - id: "deepseek-v4-flash"
        tier: "cheap"
        cost_per_1k_prompt: 0.00015
        cost_per_1k_completion: 0.0006

  # ── 智谱 AI (GLM) ─────────────────────────────
  - name: "zhipu"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    api_key_env: "ZHIPU_API_KEY"
    models:
      - id: "glm-4-flash"
        tier: "cheap"
        cost_per_1k_prompt: 0.000014
        cost_per_1k_completion: 0.000014
      - id: "glm-4-air"
        tier: "mid"
        cost_per_1k_prompt: 0.00007
        cost_per_1k_completion: 0.00007
      - id: "glm-4-plus"
        tier: "premium"
        cost_per_1k_prompt: 0.007
        cost_per_1k_completion: 0.007

  # ── 通义千问 (阿里云 DashScope) ────────────────
  - name: "qwen"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: "DASHSCOPE_API_KEY"
    models:
      - id: "qwen-turbo"
        tier: "cheap"
        cost_per_1k_prompt: 0.00004
        cost_per_1k_completion: 0.00008
      - id: "qwen-plus"
        tier: "mid"
        cost_per_1k_prompt: 0.00011
        cost_per_1k_completion: 0.00028
      - id: "qwen-max"
        tier: "premium"
        cost_per_1k_prompt: 0.00028
        cost_per_1k_completion: 0.00083

  # ── 月之暗面 Moonshot (Kimi) ──────────────────
  - name: "moonshot"
    base_url: "https://api.moonshot.cn/v1"
    api_key_env: "MOONSHOT_API_KEY"
    models:
      - id: "moonshot-v1-8k"
        tier: "mid"
        cost_per_1k_prompt: 0.00017
        cost_per_1k_completion: 0.00017
      - id: "moonshot-v1-32k"
        tier: "premium"
        cost_per_1k_prompt: 0.00033
        cost_per_1k_completion: 0.00033

  # ── 字节豆包 (火山引擎) ───────────────────────
  - name: "doubao"
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    api_key_env: "DOUBAO_API_KEY"
    models:
      - id: "doubao-lite-4k"
        tier: "cheap"
        cost_per_1k_prompt: 0.00004
        cost_per_1k_completion: 0.00008
      - id: "doubao-pro-4k"
        tier: "mid"
        cost_per_1k_prompt: 0.00011
        cost_per_1k_completion: 0.00028
      - id: "doubao-pro-32k"
        tier: "premium"
        cost_per_1k_prompt: 0.00028
        cost_per_1k_completion: 0.0011

  # ── 百度文心 (ERNIE) ──────────────────────────
  - name: "baidu"
    base_url: "https://qianfan.baidubce.com/v2"
    api_key_env: "BAIDU_API_KEY"
    models:
      - id: "ernie-speed"
        tier: "cheap"
        cost_per_1k_prompt: 0.0     # 百度 ERNIE Speed 免费模型
        cost_per_1k_completion: 0.0
      - id: "ernie-lite"
        tier: "mid"
        cost_per_1k_prompt: 0.00004
        cost_per_1k_completion: 0.00011
      - id: "ernie-4.0"
        tier: "premium"
        cost_per_1k_prompt: 0.0017
        cost_per_1k_completion: 0.0042

  # ── 零一万物 (01.AI / Yi) ────────────────────
  - name: "yi"
    base_url: "https://api.lingyiwanwu.com/v1"
    api_key_env: "YI_API_KEY"
    models:
      - id: "yi-lightning"
        tier: "cheap"
        cost_per_1k_prompt: 0.0001
        cost_per_1k_completion: 0.0004
      - id: "yi-medium"
        tier: "mid"
        cost_per_1k_prompt: 0.0005
        cost_per_1k_completion: 0.002
      - id: "yi-large"
        tier: "premium"
        cost_per_1k_prompt: 0.002
        cost_per_1k_completion: 0.008

  # ── MiniMax ───────────────────────────────────
  - name: "minimax"
    base_url: "https://api.minimax.chat/v1"
    api_key_env: "MINIMAX_API_KEY"
    models:
      - id: "abab6.5s"
        tier: "cheap"
        cost_per_1k_prompt: 0.00007
        cost_per_1k_completion: 0.00007
      - id: "abab6.5"
        tier: "mid"
        cost_per_1k_prompt: 0.00042
        cost_per_1k_completion: 0.00042

  # ── OpenRouter（国际聚合路由）─────────────────
  - name: "openrouter"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    models:
      - id: "openai/gpt-4.1-mini"
        tier: "mid"
        cost_per_1k_prompt: 0.0004
        cost_per_1k_completion: 0.0016
      - id: "google/gemini-2.5-flash"
        tier: "cheap"
        cost_per_1k_prompt: 0.00015
        cost_per_1k_completion: 0.0006
      - id: "anthropic/claude-haiku-4-5"
        tier: "mid"
        cost_per_1k_prompt: 0.0008
        cost_per_1k_completion: 0.004
      - id: "anthropic/claude-sonnet-4-6"
        tier: "premium"
        cost_per_1k_prompt: 0.003
        cost_per_1k_completion: 0.015
      - id: "deepseek/deepseek-chat"
        tier: "cheap"
        cost_per_1k_prompt: 0.00027
        cost_per_1k_completion: 0.0011
      - id: "mistral/mistral-small"
        tier: "mid"
        cost_per_1k_prompt: 0.0002
        cost_per_1k_completion: 0.0006

# 路由规则 — 中英文混合场景优化
routing:
  simple_max_tokens: 300
  complex_min_tokens: 1500

  # 简单任务关键词（不区分大小写）
  simple_keywords:
    - "翻译"
    - "总结"
    - "概括"
    - "摘要"
    - "提取"
    - "分类"
    - "什么是"
    - "定义"
    - "解释"
    - "列出"
    - "转换"
    - "纠错"
    - "润色"
    - "改写"
    - "缩写"
    - "扩写"
    - "summarize"
    - "translate"
    - "extract"
    - "classify"
    - "what is"
    - "define"
    - "list"
    - "convert"

  # 复杂任务关键词
  complex_keywords:
    - "逐步"
    - "仔细思考"
    - "推理"
    - "调试"
    - "实现"
    - "编写代码"
    - "重构"
    - "设计"
    - "架构"
    - "优化"
    - "分析原因"
    - "数学证明"
    - "逻辑推理"
    - "代码审查"
    - "性能优化"
    - "step by step"
    - "think carefully"
    - "reason about"
    - "debug"
    - "implement"
    - "write code"
    - "refactor"
    - "design"

  tier_simple: "cheap"
  tier_complex: "premium"
  tier_default: "mid"

# 质量兜底
safety_net:
  enabled: true
  max_fallback_retries: 1
  fallback_map:
    cheap: "mid"
    mid: "premium"
  fallback_on_empty_response: true
  fallback_on_truncated: true

# License
license:
  key: ""
  # 留空为免费版。Pro Key 解锁智能路由 + 安全兜底 + 响应缓存。

# 响应缓存（Pro 功能：相同提示词不重复调用 API）
cache:
  ttl_hours: 24       # 缓存条目 24 小时后过期
  max_entries: 10000   # 最多缓存 10,000 条响应

# 预算封顶 — 设为 0 表示无限制
budget:
  daily_limit_usd: 0.0
  monthly_limit_usd: 0.0

# 存储
storage:
  db_path: "./tokenwise.db"
  retention_days: 90
