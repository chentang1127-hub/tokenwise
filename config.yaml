# Routing rules
routing:
  # Complexity thresholds for prompt token counts
  simple_max_tokens: 300
  complex_min_tokens: 1500

  # Simple-task keywords (case-insensitive)
  simple_keywords:
    - "summarize"
    - "translate"
    - "extract"
    - "classify"
    - "what is"
    - "define"
    - "list"
    - "convert"

  # Complex-task patterns (case-insensitive)
  complex_keywords:
    - "step by step"
    - "think carefully"
    - "reason about"
    - "debug"
    - "implement"
    - "write code"
    - "refactor"
    - "design"

  # Model tier selection
  tier_simple: "cheap"
  tier_complex: "premium"
  tier_default: "mid"

# Quality safety net
safety_net:
  enabled: true
  max_fallback_retries: 1
  # Fallback chain: if tier X fails, try tier Y
  fallback_map:
    cheap: "mid"
    mid: "premium"
  # Triggers for fallback
  fallback_on_empty_response: true
  fallback_on_truncated: true

# License
license:
  key: "tw_pro_YOUR_LICENSE_KEY_HERE"
  # Pro license — smart routing + safety net + cache enabled.
  # Generate a key with: tokenwise keygen --days 365

# Response cache (Pro feature: avoids repeat API calls for identical prompts)
cache:
  ttl_hours: 24       # Cache entries expire after 24 hours
  max_entries: 10000   # Maximum cached responses

# Budget caps — set to 0 to disable (unlimited)
budget:
  daily_limit_usd: 0.0
  monthly_limit_usd: 0.0

# Storage
storage:
  db_path: "./tokenwise.db"
  retention_days: 90
