# TokenWise Core configuration
# Default config — edit to match your setup.

# Locale: "en" for English, "zh" for Chinese
locale: "en"

# Run without opening a browser (set to true for Docker/headless servers)
headless: false

proxy:
  listen: "0.0.0.0:9401"       # The proxy port your app connects to (0.0.0.0 = all interfaces)
  admin: "0.0.0.0:9400"        # Dashboard + API port
  timeout_secs: 120             # Upstream request timeout

# Your API provider configurations
providers:
  - name: "openai"
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    models:
      - id: "gpt-4.1"
        tier: "premium"
        cost_per_1k_prompt:    0.002
        cost_per_1k_completion: 0.008
      - id: "gpt-4.1-mini"
        tier: "mid"
        cost_per_1k_prompt:    0.0001
        cost_per_1k_completion: 0.0004
      - id: "gpt-4.1-nano"
        tier: "cheap"
        cost_per_1k_prompt:    0.00005
        cost_per_1k_completion: 0.0002

  - name: "anthropic"
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"
