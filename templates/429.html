<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>429 — TokenWise Core</title>
<style>
  :root {
    --bg: #0f172a; --card-bg: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --yellow: #eab308;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { text-align: center; max-width: 480px; padding: 48px 24px; }
  .code { font-size: 96px; font-weight: 800; color: var(--yellow); opacity: 0.4; line-height: 1; }
  .title { font-size: 24px; font-weight: 600; margin: 16px 0 8px; }
  .desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
  .budget-info { font-size: 13px; color: var(--yellow); margin-bottom: 24px; padding: 12px; background: rgba(234,179,8,0.06); border: 1px solid rgba(234,179,8,0.15); border-radius: 8px; }
  .btn { display: inline-block; padding: 10px 24px; background: var(--yellow); color: #000; font-weight: 600; border-radius: 8px; text-decoration: none; font-size: 14px; transition: opacity 0.15s; margin: 0 6px; }
  .btn:hover { opacity: 0.9; }
  .btn-ghost { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); }
  .footer { margin-top: 48px; font-size: 12px; color: var(--muted); opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <div class="code">429</div>
  <h1 class="title">Rate Limit Reached</h1>
  <p class="desc">You've exceeded your configured API call budget. TokenWise Core has paused outgoing requests to protect your billing.</p>
  <div class="budget-info">Check your budget settings in <code>config.yaml</code> — daily / monthly limits can be adjusted under <code>budget:</code> section.</div>
  <a href="/" class="btn">Dashboard</a>
  <a href="javascript:location.reload()" class="btn btn-ghost">Try Again</a>
  <div class="footer">TokenWise Core {{ version }}</div>
</div>
</body>
</html>
