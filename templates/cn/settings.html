<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenWise Core — 设置</title>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --card-bg: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --green: #22c55e; --blue: #3b82f6;
    --purple: #a855f7; --red: #ef4444; --yellow: #eab308;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 24px; align-items: center; height: 56px; }
  nav a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 12px; border-radius: 6px; transition: all 0.15s; }
  nav a:hover, nav a.active { color: var(--text); background: rgba(255,255,255,0.05); }
  nav .brand { font-weight: 700; font-size: 18px; color: var(--green); }
  nav .lang-toggle { margin-left: auto; border: 1px solid var(--border); padding: 4px 10px; font-size: 12px; }
  main { max-width: 800px; margin: 0 auto; padding: 32px 24px; }

  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 24px; }
  .card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-desc { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .card-desc code { background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .settings-field { }
  .settings-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .settings-textarea { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; resize: vertical; line-height: 1.6; }
  .settings-textarea:focus { outline: none; border-color: var(--blue); }
  .settings-input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
  .settings-input:focus { outline: none; border-color: var(--blue); }
  .settings-input::placeholder { color: var(--muted); opacity: 0.45; }
  .btn { display: inline-block; padding: 10px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; }
  .btn-primary { background: var(--green); color: #000; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { color: var(--text); border-color: var(--muted); }
  .btn-row { display: flex; gap: 12px; align-items: center; margin-top: 16px; }
  .save-status { font-size: 13px; }
  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle-row input[type="checkbox"] { accent-color: var(--green); width: 18px; height: 18px; cursor: pointer; }
  .toggle-row span { font-size: 13px; }
  .footer { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; }

  @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body hx-boost="true">
<nav>
  <span class="brand">⚡ TokenWise Core</span>
  <a href="/">仪表板</a>
  <a href="/calls">调用记录</a>
  <a href="/savings">节省分析</a>
  <a href="/settings" class="active">设置</a>
  <a href="{{ lang_toggle_url }}" class="lang-toggle">{{ lang_toggle_label }}</a>
</nav>
<main>

  <!-- 路由关键词 -->
  <div class="card">
    <h3>路由关键词</h3>
    <p class="card-desc">简单任务关键词路由到更便宜的模型；复杂任务关键词路由到高级模型。每行一个，不区分大小写。保存后需重启生效。</p>

    <div class="settings-grid">
      <div class="settings-field">
        <label for="simple-keywords">简单任务关键词</label>
        <textarea id="simple-keywords" name="simple_keywords" rows="8" class="settings-textarea">{{ simple_keywords }}</textarea>
      </div>
      <div class="settings-field">
        <label for="complex-keywords">复杂任务关键词</label>
        <textarea id="complex-keywords" name="complex_keywords" rows="8" class="settings-textarea">{{ complex_keywords }}</textarea>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="save-routing-btn" onclick="saveRouting()">保存路由规则</button>
      <span id="routing-save-status" class="save-status"></span>
    </div>
  </div>

  <!-- Webhook 通知 -->
  <div class="card">
    <h3>Webhook 通知</h3>
    <p class="card-desc">预算接近或超出上限时收到告警通知。保存后需重启生效。支持 Slack、Discord 及任意 HTTP webhook 端点。</p>

    <div class="settings-field" style="margin-bottom:14px;">
      <label for="webhook-url">Webhook URL</label>
      <input type="url" id="webhook-url" class="settings-input" value="{{ webhook_url }}" placeholder="https://hooks.slack.com/..." />
    </div>

    <div class="settings-grid" style="grid-template-columns: 1fr 1fr 1fr;">
      <div class="settings-field">
        <label for="webhook-pct">告警阈值 (%)</label>
        <input type="number" id="webhook-pct" class="settings-input" value="{{ webhook_warning_pct }}" min="1" max="100" />
      </div>
      <div class="settings-field">
        <label for="webhook-cooldown">冷却时间 (秒)</label>
        <input type="number" id="webhook-cooldown" class="settings-input" value="{{ webhook_cooldown_secs }}" min="60" />
      </div>
      <div class="settings-field" style="display:flex;align-items:flex-end;">
        <label class="toggle-row" style="margin-bottom:0;">
          <input type="checkbox" id="webhook-anomaly" {% if webhook_anomaly %}checked{% endif %} />
          <span>异常检测</span>
        </label>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveWebhookConfig()">保存 Webhook 配置</button>
      <button class="btn btn-outline" onclick="testWebhook()">发送测试</button>
      <span id="webhook-save-status" class="save-status"></span>
    </div>
  </div>

</main>
<div class="footer">TokenWise Core {{ version }} &middot; 数据仅存储在本地 &middot; 不外传任何信息</div>

<script>
// ── 路由关键词 ────────────────────────────────────────
async function saveRouting() {
  var simple = document.getElementById('simple-keywords').value.split('\n').filter(function(l) { return l.trim(); });
  var complex = document.getElementById('complex-keywords').value.split('\n').filter(function(l) { return l.trim(); });
  var status = document.getElementById('routing-save-status');

  try {
    var resp = await fetch('/api/settings/routing', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ simple_keywords: simple, complex_keywords: complex }),
    });
    var data = await resp.json();
    if (data.ok) {
      status.textContent = '已保存！需重启 TokenWise 后生效。';
      status.style.color = 'var(--green)';
    } else {
      status.textContent = '错误: ' + (data.error || '未知错误');
      status.style.color = 'var(--red)';
    }
  } catch (e) {
    status.textContent = '连接失败: ' + e.message;
    status.style.color = 'var(--red)';
  }
}

// ── Webhook 配置 ──────────────────────────────────────
async function saveWebhookConfig() {
  var status = document.getElementById('webhook-save-status');
  try {
    var resp = await fetch('/api/webhook-config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url: document.getElementById('webhook-url').value,
        budget_warning_pct: parseFloat(document.getElementById('webhook-pct').value) / 100.0,
        cooldown_secs: parseInt(document.getElementById('webhook-cooldown').value),
        anomaly_detection: document.getElementById('webhook-anomaly').checked,
      }),
    });
    var data = await resp.json();
    status.textContent = data.ok ? '已保存！重启后生效。' : '错误: ' + (data.error || '');
    status.style.color = data.ok ? 'var(--green)' : 'var(--red)';
  } catch (e) {
    status.textContent = '连接失败: ' + e.message;
    status.style.color = 'var(--red)';
  }
}

// ── 测试 Webhook ──────────────────────────────────────
async function testWebhook() {
  var status = document.getElementById('webhook-save-status');
  status.textContent = '正在发送测试...';
  status.style.color = 'var(--muted)';
  try {
    var resp = await fetch('/api/test-webhook', { method: 'POST' });
    var data = await resp.json();
    status.textContent = data.ok ? '测试已发送！状态: ' + data.status_code : '失败: ' + (data.error || data.status_code);
    status.style.color = data.ok ? 'var(--green)' : 'var(--red)';
  } catch (e) {
    status.textContent = '连接失败: ' + e.message;
    status.style.color = 'var(--red)';
  }
}
</script>
</body>
</html>
