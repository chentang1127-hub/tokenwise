<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokenWise — 调用记录</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
  :root {
    --bg: #0f172a; --card-bg: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --green: #22c55e; --blue: #3b82f6;
    --purple: #a855f7; --red: #ef4444; --yellow: #eab308;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 24px; align-items: center; height: 56px; }
  nav a { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 12px; border-radius: 6px; transition: all 0.15s; }
  nav a:hover, nav a.active { color: var(--text); background: rgba(255,255,255,0.05); }
  nav .brand { font-weight: 700; font-size: 18px; color: var(--green); margin-right: auto; }
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  tr:hover { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge.simple { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.medium { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge.complex { background: rgba(239,68,68,0.15); color: var(--red); }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .footer { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body hx-boost="true">
<nav>
  <span class="brand">⚡ TokenWise</span>
  <a href="/">仪表板</a>
  <a href="/calls" class="active">调用记录</a>
  <a href="/savings">节省分析</a>
</nav>
<main>
  <h2 class="section-title">全部 API 调用</h2>
  {% if calls.is_empty() %}
  <div class="empty">
    <h3>暂无 API 调用</h3>
    <p>发起 API 请求后，记录将在此显示。</p>
  </div>
  {% else %}
  <table>
    <thead><tr><th>模型</th><th>复杂度</th><th>延迟</th><th>费用</th></tr></thead>
    <tbody>
    {% for call in calls %}
    <tr>
      <td>{{ call.model }}</td>
      <td><span class="badge {{ call.complexity }}">{{ call.complexity }}</span></td>
      <td>{{ call.latency }}</td>
      <td>{{ call.cost }}</td>
    </tr>
    {% endfor %}
    </tbody>
  </table>
  {% endif %}
</main>
<div class="footer">TokenWise v0.1.0 · 数据仅存储在本地 · 不外传任何信息</div>
</body>
</html>
