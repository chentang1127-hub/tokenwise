<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — TokenWise Core</title>
<style>
  :root {
    --bg: #0f172a; --card-bg: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --green: #22c55e; --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { text-align: center; max-width: 480px; padding: 48px 24px; }
  .code { font-size: 96px; font-weight: 800; color: var(--muted); opacity: 0.3; line-height: 1; }
  .title { font-size: 24px; font-weight: 600; margin: 16px 0 8px; }
  .desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
  .btn { display: inline-block; padding: 10px 24px; background: var(--green); color: #000; font-weight: 600; border-radius: 8px; text-decoration: none; font-size: 14px; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.9; }
  .footer { margin-top: 48px; font-size: 12px; color: var(--muted); opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1 class="title">页面未找到</h1>
  <p class="desc">您访问的页面不存在，可能已被移动或 URL 输入有误。</p>
  <a href="/" class="btn">返回仪表板</a>
  <div class="footer">TokenWise Core {{ version }}</div>
</div>
</body>
</html>
