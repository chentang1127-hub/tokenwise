<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500 — TokenWise Core</title>
<style>
  :root {
    --bg: #0f172a; --card-bg: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --red: #ef4444; --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { text-align: center; max-width: 480px; padding: 48px 24px; }
  .code { font-size: 96px; font-weight: 800; color: var(--red); opacity: 0.4; line-height: 1; }
  .title { font-size: 24px; font-weight: 600; margin: 16px 0 8px; }
  .desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
  .hint { font-size: 13px; color: var(--muted); opacity: 0.7; margin-top: 24px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; }
  .hint code { color: var(--blue); font-size: 12px; }
  .btn { display: inline-block; padding: 10px 24px; background: var(--blue); color: #fff; font-weight: 600; border-radius: 8px; text-decoration: none; font-size: 14px; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.9; }
  .footer { margin-top: 48px; font-size: 12px; color: var(--muted); opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <div class="code">500</div>
  <h1 class="title">Internal Server Error</h1>
  <p class="desc">Something went wrong on our end. Try refreshing the page, or check the server logs for details.</p>
  <a href="/" class="btn">Back to Dashboard</a>
  <div class="hint">Check logs: <code>journalctl -u tokenwise -f</code> or <code>docker compose logs tokenwise</code></div>
  <div class="footer">TokenWise Core {{ version }}</div>
</div>
</body>
</html>
