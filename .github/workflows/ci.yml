name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Tests (all platforms) ──────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

  # ── Clippy + fmt ────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      - run: cargo clippy -- -D warnings

  # ── Build release binaries (on tag or release) ─────
  build:
    name: Build (${{ matrix.target }})
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    needs: [test, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: tokenwise
            archive: tokenwise-linux-x86_64.tar.gz
          - os: macos-15
            target: x86_64-apple-darwin
            artifact: tokenwise
            archive: tokenwise-darwin-x86_64.tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            artifact: tokenwise
            archive: tokenwise-darwin-aarch64.tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            artifact: tokenwise.exe
            archive: tokenwise-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (non-Windows)
        if: matrix.os != 'windows-2025'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-2025'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Package (Windows)
        if: matrix.os == 'windows-2025'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.archive }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: target/${{ matrix.target }}/release/${{ matrix.archive }}

  # ── Docker image (on release) ──────────────────────
  docker:
    name: Docker (ghcr.io)
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    needs: [test, lint]
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  # ── GitHub Release (on tag or release) ─────────────
  release:
    name: Create Release
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
