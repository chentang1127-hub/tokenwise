name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Tests (Linux only, fastest) ─────────────────────
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"

      - uses: Swatinem/rust-cache@v2

      - run: cargo test --locked
      - run: cargo test --locked --release

  # ── Clippy + fmt ────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  # ── Build (all platforms) ───────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [test, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tokenwise
            archive: tokenwise-linux-amd64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tokenwise
            archive: tokenwise-macos-amd64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tokenwise
            archive: tokenwise-macos-arm64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tokenwise.exe
            archive: tokenwise-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96"
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary (non-Windows)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.archive }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: target/${{ matrix.target }}/release/${{ matrix.archive }}

  # ── GitHub Release (on tag) ─────────────────────────
  release:
    name: Create Release
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
